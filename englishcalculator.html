<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --night: #080c1a;
      --deep: #0d1530;
      --mid: #111d3d;
      --moon: #e8dfc8;
      --star: #c9bfa8;
      --glow: #5b7cfa;
      --glow2: #a78bfa;
      --accent: #f0c96e;
      --soft: rgba(255,255,255,0.06);
    }

    body {
      background: var(--night);
      color: var(--moon);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Star field */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
      50% { opacity: var(--max-op, 0.9); transform: scale(1.3); }
    }

    /* Moon glow */
    .moon-glow {
      position: fixed;
      top: -120px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(91,124,250,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: moonPulse 8s ease-in-out infinite;
    }
    @keyframes moonPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }
    .moon-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(91,124,250,0.6));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--moon) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--star);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 4px;
      margin-bottom: 32px;
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .tab {
      flex: 1; border: none; background: transparent;
      color: var(--star); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      padding: 12px 16px; border-radius: 12px;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--glow), var(--glow2));
      color: white;
      box-shadow: 0 4px 20px rgba(91,124,250,0.4);
    }
    .tab:hover:not(.active) {
      color: var(--moon);
      background: rgba(255,255,255,0.05);
    }

    /* Card */
    .card {
      background: rgba(13, 21, 48, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px;
      animation: fadeUp 0.8s 0.2s ease both;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--star);
      margin-bottom: 12px;
    }

    .time-input-wrapper {
      position: relative;
      margin-bottom: 28px;
    }
    input[type="time"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: var(--moon);
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      letter-spacing: 0.02em;
      padding: 16px 20px;
      outline: none;
      transition: all 0.3s ease;
      cursor: pointer;
      -webkit-appearance: none;
    }
    input[type="time"]:focus {
      border-color: var(--glow);
      box-shadow: 0 0 0 3px rgba(91,124,250,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
      background: rgba(91,124,250,0.08);
    }
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.4);
      cursor: pointer;
    }

    /* Cycles */
    .cycles-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--star);
      margin-bottom: 12px;
      display: flex; justify-content: space-between;
    }
    .cycles-track {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .cycle-dot {
      flex: 1; height: 8px; border-radius: 4px;
      background: rgba(255,255,255,0.1);
      cursor: pointer; transition: all 0.3s ease;
    }
    .cycle-dot.active {
      background: linear-gradient(90deg, var(--glow), var(--glow2));
      box-shadow: 0 2px 10px rgba(91,124,250,0.5);
    }
    .cycle-info {
      text-align: center;
      font-size: 0.8rem;
      color: var(--star);
      margin-bottom: 24px;
      margin-top: -20px;
    }
    .cycle-info strong {
      color: var(--accent);
    }

    /* Button */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--glow) 0%, var(--glow2) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(91,124,250,0.5); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    /* Results */
    .results {
      margin-top: 28px;
      display: none;
    }
    .results.show { display: block; animation: fadeUp 0.5s ease both; }

    .results-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--star);
      margin-bottom: 12px;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      margin-bottom: 8px;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease both;
      cursor: default;
    }
    .result-item:hover {
      background: rgba(91,124,250,0.1);
      border-color: rgba(91,124,250,0.3);
      transform: translateX(4px);
    }
    .result-item:nth-child(1) { animation-delay: 0.05s; }
    .result-item:nth-child(2) { animation-delay: 0.1s; }
    .result-item:nth-child(3) { animation-delay: 0.15s; }

    .result-icon { font-size: 1.3rem; flex-shrink: 0; }
    .result-time {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
      color: var(--moon);
      flex: 1;
    }
    .result-time.best { color: var(--accent); }
    .result-meta {
      text-align: right;
      font-size: 0.75rem;
      color: var(--star);
      line-height: 1.5;
    }
    .result-meta .cycles-count {
      font-weight: 500;
      color: var(--glow2);
    }

    /* Badge */
    .best-badge {
      background: linear-gradient(135deg, var(--accent), #f59e0b);
      color: #1a0f00;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* Info strip */
    .info-strip {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }
    .info-chip {
      flex: 1;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--star);
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .info-chip strong {
      display: block;
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--moon);
      margin-bottom: 2px;
    }
    .info-chip.clickable {
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }
    .info-chip.clickable:hover {
      border-color: rgba(91,124,250,0.4);
      background: rgba(91,124,250,0.08);
    }
    .info-chip.clickable.toggled {
      background: rgba(91,124,250,0.15);
      border-color: rgba(91,124,250,0.5);
      box-shadow: 0 0 16px rgba(91,124,250,0.2);
    }
    .info-chip.clickable.toggled strong {
      color: var(--glow2);
    }
    .info-chip.clickable.toggled .chip-label {
      color: var(--moon);
    }
    .toggle-hint {
      display: block;
      font-size: 0.6rem;
      margin-top: 4px;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }
    .info-chip.clickable.toggled .toggle-hint {
      color: var(--glow2);
      opacity: 0.8;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Panel visibility */
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="moon-glow"></div>

<div class="container">
  <div class="header">
    <span class="moon-icon">🌙</span>
    <h1>Sleep Calculator</h1>
    <p class="subtitle">Wake up refreshed — every time</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('bedtime')">
      🛌 When to sleep?
    </button>
    <button class="tab" onclick="switchTab('wakeup')">
      ⏰ When to wake up?
    </button>
  </div>

  <div class="card">
    <!-- Panel 1: Bedtime calculator -->
    <div class="panel active" id="panel-bedtime">
      <p class="label">I want to wake up at</p>
      <div class="time-input-wrapper">
        <input type="time" id="wakeTime" value="07:00">
      </div>
      <div class="cycles-label">
        <span>Number of sleep cycles</span>
      </div>
      <div class="cycles-track" id="bedCycles">
        <div class="cycle-dot" onclick="setCycles('bed',4)" data-n="4"></div>
        <div class="cycle-dot" onclick="setCycles('bed',5)" data-n="5"></div>
        <div class="cycle-dot active" onclick="setCycles('bed',6)" data-n="6"></div>
      </div>
      <p class="cycle-info" id="bedCycleInfo">Selected: <strong>6 cycles = 9 hours</strong></p>
      <button class="btn" onclick="calcBedtime()">Calculate sleep time</button>
      <div class="results" id="bedResults"></div>
    </div>

    <!-- Panel 2: Wake-up calculator -->
    <div class="panel" id="panel-wakeup">
      <p class="label">I'm going to sleep at</p>
      <div class="time-input-wrapper">
        <input type="time" id="sleepTime" value="23:00">
      </div>
      <div class="cycles-label">
        <span>Number of sleep cycles</span>
      </div>
      <div class="cycles-track" id="wakeCycles">
        <div class="cycle-dot" onclick="setCycles('wake',4)" data-n="4"></div>
        <div class="cycle-dot" onclick="setCycles('wake',5)" data-n="5"></div>
        <div class="cycle-dot active" onclick="setCycles('wake',6)" data-n="6"></div>
      </div>
      <p class="cycle-info" id="wakeCycleInfo">Selected: <strong>6 cycles = 9 hours</strong></p>
      <button class="btn" onclick="calcWakeTime()">Calculate wake-up time</button>
      <div class="results" id="wakeResults"></div>
    </div>
  </div>

  <div class="info-strip">
    <div class="info-chip">
      <strong>90 min</strong>
      sleep cycle
    </div>
    <div class="info-chip">
      <strong>5–6</strong>
      cycles optimal
    </div>
    <div class="info-chip clickable" id="fallChip" onclick="toggleFall()">
      <strong>15 min</strong>
      <span class="chip-label">to fall asleep</span>
      <span class="toggle-hint" id="fallHint">click for lie-down time</span>
    </div>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:-${Math.random()*5}s;
      --min-op:${0.1+Math.random()*0.2};
      --max-op:${0.6+Math.random()*0.4};
    `;
    starsEl.appendChild(s);
  }

  // State
  const cycles = { bed: 6, wake: 6 };
  const CYCLE = 90;
  const FALL = 15;
  let fallToggled = false;

  function toggleFall() {
    fallToggled = !fallToggled;
    const chip = document.getElementById('fallChip');
    const hint = document.getElementById('fallHint');
    chip.classList.toggle('toggled', fallToggled);
    hint.textContent = fallToggled ? '✓ showing lie-down time' : 'click for lie-down time';
    // Recalculate if results already shown
    const res = document.getElementById('bedResults');
    if (res.classList.contains('show')) calcBedtime();
  }

  function switchTab(mode) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && mode==='bedtime')||(i===1 && mode==='wakeup')));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + mode).classList.add('active');
  }

  function setCycles(type, n) {
    cycles[type] = n;
    const prefix = type === 'bed' ? 'bed' : 'wake';
    const track = document.getElementById(prefix + 'Cycles');
    track.querySelectorAll('.cycle-dot').forEach(d => {
      d.classList.toggle('active', parseInt(d.dataset.n) <= n);
    });
    const infoEl = document.getElementById(prefix + 'CycleInfo');
    infoEl.innerHTML = `Selected: <strong>${n} cycles = ${n * 1.5} hours</strong>`;
  }

  // Init dots
  setCycles('bed', 6);
  setCycles('wake', 6);

  function formatTime(mins) {
    mins = ((mins % 1440) + 1440) % 1440;
    return `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
  }

  function calcBedtime() {
    const [h, m] = document.getElementById('wakeTime').value.split(':').map(Number);
    const wake = h * 60 + m;
    const maxC = cycles.bed;
    const items = [];
    // Default: fall-asleep time = wake - cycles*90
    // Toggled: lie-down time = wake - cycles*90 - 15
    const offset = fallToggled ? FALL : 0;
    for (let c = maxC; c >= Math.max(4, maxC - 2); c--) {
      items.push({ time: formatTime(wake - c * CYCLE - offset), cycles: c, hours: c * 1.5 });
    }
    const title = fallToggled ? 'Ideal time to get into bed' : 'Ideal times to fall asleep';
    const icon = fallToggled ? '🛏️' : '🌙';
    showResults('bedResults', items, title, icon, true);
  }

  function calcWakeTime() {
    const [h, m] = document.getElementById('sleepTime').value.split(':').map(Number);
    const sleep = h * 60 + m + FALL;
    const maxC = cycles.wake;
    const items = [];
    for (let c = maxC; c >= Math.max(4, maxC - 2); c--) {
      items.push({ time: formatTime(sleep + c * CYCLE), cycles: c, hours: c * 1.5 });
    }
    showResults('wakeResults', items, 'Ideal wake-up times', '⏰', true);
  }

  function showResults(id, items, title, icon, firstBest) {
    const el = document.getElementById(id);
    let html = `<p class="results-title">${title}</p>`;
    items.forEach((item, i) => {
      const isBest = i === 0;
      html += `
        <div class="result-item">
          <span class="result-icon">${icon}</span>
          <span class="result-time ${isBest ? 'best' : ''}">${item.time}</span>
          <div class="result-meta">
            <span class="cycles-count">${item.cycles} cycles</span><br>
            ${item.hours}h of sleep
          </div>
          ${isBest ? '<span class="best-badge">Ideal</span>' : ''}
        </div>`;
    });
    el.innerHTML = html;
    el.classList.add('show');
  }
</script>
</body>
</html>
